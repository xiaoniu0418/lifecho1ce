<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>抉擇天秤｜遊戲</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="./插件/bootstrap-5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
    
  <link rel="stylesheet" href="./插件/fontswesome/fontawesome-free-6.6.0-web/css/all.min.css">
</head>

<body class="body_bg">
  <div class="page-wrap">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="brand mini">
        <div class="brand-badge">⚖</div>
        <div>
          <div class="brand-title">抉擇天秤</div>
          <div class="brand-sub">走完三圈回到起點會觸發結局</div>
        </div>
      </div>

      <button class="btn btn-outline-light rounded-pill px-4" id="btnRestart">重新開始</button>
    </div>

    <div class="row g-3">
  <!-- 左：棋盤（桌機左側；小螢幕第一個） -->
  <div class="col-lg-8 order-1 game-main">
    <div class="cardx mb-3">
      <div class="cardx-hd d-flex align-items-center justify-content-between">
        <span class="pill">棋盤</span>
        <span class="muted small"></span>
      </div>

      <div class="cardx-bd">
        <div id="board" class="board-area"></div>
      </div>
    </div>
  </div>

  <!-- 右：目前玩家 + 操作（桌機右側；小螢幕第二個） -->
  <div class="col-lg-4 order-2 game-side">
    <!-- ✅ 目前要擲骰的玩家狀態（顯示在操作上方） -->
    <div class="cardx mb-3">
      <div class="cardx-hd d-flex align-items-center justify-content-between">
        <span class="pill">目前玩家</span>
        <span class="muted small">即將擲骰</span>
      </div>
      <div class="cardx-bd" id="turnStatus"></div>
    </div>

    <div class="cardx">
      <div class="cardx-hd d-flex align-items-center justify-content-between">
        <span class="pill pill-green">操作</span>
      </div>
      <div class="cardx-bd">
        <button class="btn-start" id="btnRoll">
          擲骰子
          <span class="dice-box" id="diceBox" aria-hidden="true"></span>
        </button>

        <div class="mt-3">
          <div class="logbox" id="logBox"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ 玩家狀態（桌機：在棋盤下方同左側；小螢幕第三個，會排在操作下面） -->
  <div class="col-12 col-lg-8 order-3 game-players">
    <div class="cardx">
      <div class="cardx-hd">
        <span class="pill">玩家狀態</span>
      </div>
      <div class="cardx-bd" id="playersPanel"></div>
    </div>
  </div>
</div>


  <script src="./插件/jquery-3.7.1.min.js"></script>
  <script src="./插件/bootstrap-5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  window.BOARD_COLS = 11;
  window.BOARD_ROWS = 9;
</script>
<script src="./lifegame.js?v=20260223"></script>
    <script src="starfield.js"></script>
</body>
</html>
